name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one deploy per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history for .GitInfo in Hugo templates

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build site
        run: npm run build:hugo

      - name: Build Pagefind index
        run: npx pagefind --site public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
          retention-days: 1

  # Deploy and smoke-test are handled by Cloudflare Pages Direct Git integration.
  # No GitHub Actions deploy job needed.
