name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only one deploy per branch at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history for .GitInfo in Hugo templates

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build site
        run: npm run build:hugo

      - name: Build Pagefind index
        run: npx pagefind --site public

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on push to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: qnd-lab
          directory: public/
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Wrangler version — pin for reproducibility
          wranglerVersion: '3'

  # Post-deploy smoke test (advisory — does not fail the pipeline)
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for propagation
        run: sleep 30

      - name: Check /admin deployed
        # TODO-03: advisory check — does not fail CI
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://adv.chiba-u.jp/nano/qnd/admin/ || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✓ /admin deployed (HTTP $STATUS)"
          else
            echo "⚠ /admin returned HTTP $STATUS — check Cloudflare Pages deploy"
          fi
