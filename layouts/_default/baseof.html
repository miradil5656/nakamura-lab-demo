<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="min-h-screen flex flex-col" style="background:#000;color:#1d1d1f">
  {{- partial "header.html" . -}}
  <main id="main-content" class="flex-grow">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}

  {{- /* GSAP 3 + ScrollTrigger — loaded after DOM, deferred */}}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="{{ "js/gsap-main.js" | relURL }}" defer></script>
</body>
</html>
