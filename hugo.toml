baseURL = "https://adv.chiba-u.jp/nano/qnd/"
title = "量子ナノデバイス研究グループ — 千葉大学"
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[languages.ja]
  weight = 1
  languageCode = "ja"
  title = "量子ナノデバイス研究グループ — 千葉大学"

[languages.en]
  weight = 2
  languageCode = "en"
  contentDir = "content/en"
  title = "Quantum Nanodevice Research Group — Chiba University"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[params]
  description = "千葉大学 量子ナノデバイス研究グループ（青木研究室）の公式サイト。量子ドット、グラフェン量子輸送、TMDデバイスの研究を行っています。"
  description_en = "Official site of the Quantum Nanodevice Research Group (Aoki Lab), Chiba University. Research on quantum dots, graphene quantum transport, and TMD devices."
  author = "青木 伸之 (Nobuyuki Aoki)"
  og_image = "/images/og/og-default.jpg"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

