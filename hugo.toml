baseURL = "https://your-lab.example.com/"
title = "YOUR_LAB_NAME — YOUR_UNIVERSITY"
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[languages.ja]
  weight = 1
  languageCode = "ja"
  title = "YOUR_LAB_NAME — YOUR_UNIVERSITY"

[languages.en]
  weight = 2
  languageCode = "en"
  contentDir = "content/en"
  title = "YOUR_LAB_NAME_EN — YOUR_UNIVERSITY_EN"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5

[params]
  description = "YOUR_UNIVERSITY YOUR_LAB_NAME の公式サイト。"
  description_en = "Official site of YOUR_LAB_NAME_EN, YOUR_UNIVERSITY_EN."
  author = "YOUR_PI_NAME"
  og_image = "/images/og/og-default.jpg"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"

