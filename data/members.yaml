## data/members.yaml — ラボメンバーデータ
## 更新方法: このファイルを直接編集してください。
## 必須フィールド: name_ja, name_en, title_ja, title_en, email
## 任意フィールド: research_ja, research_en, orcid, photo

staff:
  - name_ja: "{{PI名前}}"
    name_en: "{{PI Name}}"
    title_ja: "教授"
    title_en: "Professor"
    email: "pi_at_example.ac.jp"
    research_ja: "{{研究テーマ（日本語）}}"
    research_en: "{{Research theme (English)}}"
    orcid: ""
    photo: ""

students:
  - name_ja: "{{学生名前}}"
    name_en: "{{Student Name}}"
    grade: "D1"
    year: 2025
    research_ja: "{{研究テーマ}}"
    photo: ""

alumni:
  - name_ja: "{{OB/OG名前}}"
    name_en: "{{Alumni Name}}"
    degree_ja: "修士（理学）"
    degree_en: "M.Sc. (Science)"
    year: 2025
    destination_ja: "{{就職先・進学先}}"
    destination_en: "{{Destination (English)}}"
